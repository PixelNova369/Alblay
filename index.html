<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  color:white;
  overflow:hidden;
}

/* 🌿 BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-2;

  background:
    radial-gradient(circle at 20% 25%, rgba(29,185,84,0.55), transparent 45%),
    radial-gradient(circle at 80% 15%, rgba(0,255,140,0.25), transparent 50%),
    radial-gradient(circle at 50% 85%, rgba(0,160,90,0.22), transparent 55%);

  filter: blur(75px) saturate(140%);
  animation: floatBg 11s ease-in-out infinite alternate;
}

@keyframes floatBg{
  0%{ transform:scale(1) translateY(0); }
  100%{ transform:scale(1.12) translateY(-22px); }
}

/* PAGES */
.page{
  display:none;
  height:100vh;
}
.active{ display:block; }

/* LOGIN */
#loginPage{
  background:#0b0b0f;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:10px;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  width:220px;
}

button{
  padding:12px 16px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* HOME */
#albumCover{
  width:280px;
  height:280px;
  margin:18px auto;
  border-radius:26px;

  background-size:cover;
  background-position:center;

  box-shadow:
    0 25px 90px rgba(0,0,0,0.55),
    0 0 45px rgba(29,185,84,0.30);
}

/* NOW PLAYING */
#nowPlaying{
  text-align:center;
  margin-top:10px;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-top:14px;
}

.controls button{
  width:60px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
}

/* DRAWER */
.drawer{
  position:fixed;
  bottom:78px;
  left:0;
  right:0;
  background:#111;
  padding:14px;
  border-radius:18px 18px 0 0;
  transition:0.3s;
}

.hidden{
  transform:translateY(120%);
}

/* FRIENDS */
.friendRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:8px;
  background:rgba(255,255,255,0.06);
  border-radius:12px;
}

/* NAV */
#nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.4);
}

#nav button{
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <h2>Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button id="loginBtn">Enter</button>
</div>

<!-- HOME -->
<div id="homePage" class="page">
  <div style="text-align:center;padding:16px;">

    <h2>Now Playing</h2>

    <div id="albumCover"></div>

    <div id="nowPlaying">
      <h3 id="title"></h3>
      <p id="meta"></p>
    </div>

    <div class="controls">
      <button id="prevBtn">⟲</button>
      <button id="playBtn">▶</button>
      <button id="nextBtn">⟳</button>
    </div>

    <div style="margin-top:10px;">
      <button id="drawerBtn">☰ Drawer</button>
      <button id="generateBtn">Find Album</button>
    </div>

    <div id="drawerPanel" class="drawer hidden">
      <h3>Filters</h3>

      <input id="genre" placeholder="Genre">
      <input id="era" placeholder="Era">
      <input id="length" placeholder="Length">

      <button id="closeDrawer">Back</button>
    </div>

  </div>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h2 style="padding:12px;">Friends</h2>
  <div id="friendsList"></div>
</div>

<!-- NAV -->
<div id="nav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
</div>

<script src="./app.js"></script>

</body>
</html>
