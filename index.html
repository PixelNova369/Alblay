<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-2;

  background:
    radial-gradient(circle at 20% 25%, rgba(29,185,84,0.55), transparent 45%),
    radial-gradient(circle at 80% 15%, rgba(0,255,140,0.25), transparent 50%),
    radial-gradient(circle at 50% 85%, rgba(0,160,90,0.22), transparent 55%);

  filter: blur(75px);
}

/* PAGES */
.page{ display:none; height:100vh; }
.active{ display:block; }

/* LOGIN */
#loginPage{
  background:#0b0b0f;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:10px;
}

input{
  padding:12px;
  border:none;
  border-radius:10px;
  width:220px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* HOME */
#homePage{
  text-align:center;
  padding-top:20px;
}

#albumCover{
  width:280px;
  height:280px;
  margin:18px auto;
  border-radius:26px;
  background-size:cover;
}

/* FRIENDS */
#friendsPage{
  padding:16px;
}

/* NAV */
#nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.4);
}

#nav button{
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- LOGIN -->
<div id="loginPage" class="page active">

  <h2>Alblay</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <div style="display:flex;gap:10px;">
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Sign Up</button>
  </div>

</div>

<!-- HOME -->
<div id="homePage" class="page">

  <h2>Now Playing</h2>

  <div id="albumCover"></div>

  <h3 id="title"></h3>
  <p id="meta"></p>

</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h2>Friends</h2>
  <div id="friendsList"></div>
</div>

<!-- NAV -->
<div id="nav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
</div>

<script src="./app.js"></script>

</body>
</html>
