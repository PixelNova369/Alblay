<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  color:white;
  overflow:hidden;
}

/* PAGES */
.page{
  display:none;
  height:100vh;
}
.active{ display:block; }

/* LOGIN */
#loginPage{
  background:#0b0b0f;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

input{
  padding:12px;
  margin:6px;
  border-radius:10px;
  border:none;
}

/* HOME BACKGROUND (GREEN) */
#homeBg{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(29,185,84,0.5), transparent 45%),
    radial-gradient(circle at 80% 20%, rgba(0,255,120,0.25), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(0,160,90,0.2), transparent 55%);
  filter:blur(80px);
}

/* FRIENDS BACKGROUND (PINK) */
#friendsBg{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,60,160,0.5), transparent 45%),
    radial-gradient(circle at 80% 30%, rgba(255,0,120,0.25), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(255,120,180,0.2), transparent 55%);
  filter:blur(80px);
}

/* HOME */
#albumCover{
  width:280px;
  height:280px;
  margin:20px auto;
  border-radius:24px;
  background-size:cover;
}

/* FRIENDS */
.friendRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:8px;
  background:rgba(255,255,255,0.08);
  border-radius:12px;
}

/* NAV */
#nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

#nav button{
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <button onclick="login()">Enter</button>
</div>

<!-- HOME -->
<div id="homePage" class="page">
  <div id="homeBg"></div>

  <h2>Now Playing</h2>
  <div id="albumCover"></div>

  <h3 id="title"></h3>
  <p id="meta"></p>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <div id="friendsBg"></div>

  <h2>Friends</h2>
  <div id="friendsList"></div>
</div>

<!-- NAV -->
<div id="nav">
  <button onclick="go('home')">Home</button>
  <button onclick="go('friends')">Friends</button>
</div>

<script src="./app.js"></script>

</body>
</html>
