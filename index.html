<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Generator</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* LOGIN SCREEN */
#loginPage {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

input {
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    width: 80%;
    max-width: 300px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #1db954;
    color: white;
    font-weight: bold;
}

/* MAIN APP */
#app {
    display: none;
    padding: 20px;
}

.header {
    font-size: 20px;
    margin-bottom: 10px;
}

.card {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

.album {
    background: #2a2a2a;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
}

button.small {
    margin-top: 10px;
    width: 100%;
}

/* MOBILE FRIENDLY */
@media (min-width: 700px) {
    #app {
        max-width: 600px;
        margin: auto;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <h2>Album Generator</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app">

    <div class="header">🎧 Welcome <span id="user"></span></div>

    <div class="card">
        <h3>Album Generator</h3>
        <p>Press generate to get a random album</p>
        <button onclick="generateAlbum()">Generate</button>
        <div id="result"></div>
        <button class="small" onclick="saveAlbum()">Save to Wall</button>
    </div>

    <div class="card">
        <h3>Your Album Wall</h3>
        <div id="wall"></div>
    </div>

</div>

<script>

let albums = [
    "Currents - Tame Impala",
    "Starboy - The Weeknd",
    "AM - Arctic Monkeys",
    "Graduation - Kanye West",
    "Blonde - Frank Ocean",
    "After Hours - The Weeknd",
    "To Pimp a Butterfly - Kendrick Lamar"
];

let currentAlbum = "";

function login() {
    let user = document.getElementById("username").value;

    if(user.trim() === "") {
        alert("Enter a username");
        return;
    }

    document.getElementById("user").innerText = user;
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";
}

function generateAlbum() {
    currentAlbum = albums[Math.floor(Math.random() * albums.length)];
    document.getElementById("result").innerHTML = 
        "<div class='album'>" + currentAlbum + "</div>";
}

function saveAlbum() {
    if(currentAlbum === "") return;

    let div = document.createElement("div");
    div.className = "album";
    div.innerText = currentAlbum;

    document.getElementById("wall").appendChild(div);
}

</script>

</body>
</html>
<button id="saveBtn">Save Album</button>
