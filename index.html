<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  color:white;
  background:#050505;
  overflow-x:hidden;
}

/* 🔥 VIRAL BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(29,185,84,0.35), transparent 40%),
    radial-gradient(circle at 80% 10%, rgba(0,255,140,0.25), transparent 45%),
    radial-gradient(circle at 40% 90%, rgba(10,132,255,0.15), transparent 45%);
  filter:blur(70px);
  animation:move 10s infinite alternate ease-in-out;
}

@keyframes move{
  0%{ transform:scale(1) translateY(0px); }
  100%{ transform:scale(1.2) translateY(-30px); }
}

/* PAGES */
.page{
  display:none;
  padding:16px;
}

.active{ display:block; }

/* HOME WRAP */
.homeWrap{
  text-align:center;
  padding:20px;
}

/* ALBUM */
#albumCover{
  width:310px;
  height:310px;
  margin:20px auto;
  border-radius:26px;
  background-size:cover;
  background-position:center;
  box-shadow:
    0 30px 90px rgba(0,255,120,0.15),
    0 0 40px rgba(29,185,84,0.25);
  transition:0.4s ease;
}

/* NOW PLAYING CARD */
#nowPlaying{
  background:rgba(255,255,255,0.06);
  padding:14px;
  border-radius:16px;
  backdrop-filter:blur(12px);
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:16px;
}

.controls button{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#1db954;
  color:black;
  font-size:18px;
  box-shadow:0 0 25px rgba(29,185,84,0.4);
}

/* BOTTOM CONTROLS */
.bottomControls{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.bottomControls button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  color:white;
  backdrop-filter:blur(10px);
}

/* DRAWER */
.drawer{
  position:fixed;
  bottom:80px;
  left:0;
  right:0;
  background:#111;
  padding:16px;
  border-radius:18px 18px 0 0;
  transition:0.3s ease;
  box-shadow:0 -10px 40px rgba(0,0,0,0.6);
}

.hidden{
  transform:translateY(120%);
}

/* FRIENDS */
.friendRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:8px 0;
  background:rgba(255,255,255,0.06);
  border-radius:12px;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(10,10,10,0.9);
  backdrop-filter:blur(12px);
}

button{
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="homeWrap">

    <h2>Now Playing</h2>

    <div id="albumCover"></div>

    <div id="nowPlaying">
      <h3 id="title">Loading...</h3>
      <p id="meta"></p>
    </div>

    <div class="controls">
      <button id="prevBtn">⟲</button>
      <button id="playBtn">▶</button>
      <button id="nextBtn">⟳</button>
    </div>

    <div class="bottomControls">
      <button id="drawerBtn">☰ Drawer</button>
      <button id="generateBtn">Find Album</button>
    </div>

    <div id="drawerPanel" class="drawer hidden">

      <h3>Filters</h3>

      <input id="genre" placeholder="Genre">
      <input id="era" placeholder="Era">
      <input id="length" placeholder="Length">

      <button id="applyFilters">Apply</button>
      <button id="closeDrawer">Back</button>

    </div>

  </div>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h2>Friends</h2>
  <div id="friendsList"></div>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
</div>

<script src="./app.js"></script>

</body>
</html>
