<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay DM</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0b0b0f;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-2;

  background:
    radial-gradient(circle at 20% 20%, rgba(29,185,84,0.4), transparent 45%),
    radial-gradient(circle at 80% 10%, rgba(120,80,255,0.25), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(0,200,120,0.18), transparent 55%);

  filter:blur(80px);
}

/* MAIN DM LAYOUT */
#dmContainer{
  display:flex;
  height:100vh;
}

/* FRIEND LIST */
#friendsPanel{
  width:35%;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(18px);
  padding:10px;
  overflow-y:auto;
}

.friendItem{
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  cursor:pointer;
}

/* CHAT AREA */
#chatPanel{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* CHAT HEADER */
#chatHeader{
  padding:12px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

/* MESSAGES */
#messages{
  flex:1;
  padding:12px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  padding:10px 12px;
  border-radius:12px;
  max-width:70%;
  background:rgba(255,255,255,0.08);
}

.me{
  align-self:flex-end;
  background:rgba(29,185,84,0.25);
}

/* INPUT BAR */
#inputBar{
  display:flex;
  padding:10px;
  gap:8px;
  background:rgba(255,255,255,0.05);
}

#textInput{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  border:none;
  border-radius:10px;
  padding:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="dmContainer">

  <!-- FRIENDS -->
  <div id="friendsPanel"></div>

  <!-- CHAT -->
  <div id="chatPanel">

    <div id="chatHeader">Select a friend</div>

    <div id="messages"></div>

    <div id="inputBar">
      <input id="textInput" placeholder="Message...">
      <button id="sendBtn">Send</button>
      <button id="albumBtn">🎧</button>
    </div>

  </div>

</div>

<script src="./app.js"></script>

</body>
</html>
