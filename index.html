<!DOCTYPE html>
<html>

<head>
  <title>Alblay Login</title>
</head>

<body style="margin:0; background:black; color:white; font-family:Arial;">

  <div style="
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:12px;
  ">

    <h1 style="font-size:60px;">
      <span style="color:#FF3B30;">a</span>
      <span style="color:#FF9500;">l</span>
      <span style="color:#FFCC00;">b</span>
      <span style="color:#34C759;">l</span>
      <span style="color:#0A84FF;">a</span>
      <span style="color:#AF52DE;">y</span>
    </h1>

    <input id="email" type="email" placeholder="Email"
      style="padding:14px; width:280px;" />

    <input id="password" type="password" placeholder="Password"
      style="padding:14px; width:280px;" />

    <button id="loginBtn"
      style="padding:14px 24px; background:#1DB954; border:none; color:white;">
      Login
    </button>

    <p id="auth-status"></p>

  </div>

<script type="module" src="auth.js"></script>
</body>

</html>
