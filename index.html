<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay DM</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0b0b0f;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(29,185,84,0.35), transparent 45%),
    radial-gradient(circle at 80% 10%, rgba(120,80,255,0.25), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(0,200,120,0.15), transparent 55%);
  filter:blur(80px);
}

/* MAIN DM */
#dmWrap{
  display:flex;
  height:100vh;
}

/* LEFT: INBOX */
#inbox{
  width:35%;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(18px);
  overflow-y:auto;
  padding:10px;
}

.thread{
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  cursor:pointer;
}

/* RIGHT: CHAT */
#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#chatHeader{
  padding:14px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

/* MESSAGES */
#messages{
  flex:1;
  padding:12px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* BUBBLES */
.msg{
  max-width:70%;
  padding:10px 12px;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
  align-self:flex-start;
}

.me{
  align-self:flex-end;
  background:rgba(29,185,84,0.25);
}

/* INPUT */
#inputBar{
  display:flex;
  padding:10px;
  gap:8px;
  background:rgba(255,255,255,0.05);
}

#text{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  border:none;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="dmWrap">

  <!-- INBOX -->
  <div id="inbox"></div>

  <!-- CHAT -->
  <div id="chat">

    <div id="chatHeader">Select a chat</div>

    <div id="messages"></div>

    <div id="inputBar">
      <input id="text" placeholder="Message...">
      <button id="send">Send</button>
    </div>

  </div>

</div>

<script src="./app.js"></script>

</body>
</html>
