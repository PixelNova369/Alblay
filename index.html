<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  overflow:hidden;
}

/* ================= BACKGROUNDS ================= */

#bg{
  position:fixed;
  inset:0;
  z-index:-3;
}

.waveGreen{
  position:absolute;
  inset:-200px;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,120,0.22), transparent 45%),
    radial-gradient(circle at 70% 20%, rgba(0,255,140,0.16), transparent 55%);
  filter:blur(80px);
}

.wavePink{
  position:absolute;
  inset:-200px;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,43,214,0.22), transparent 45%),
    radial-gradient(circle at 70% 20%, rgba(255,80,220,0.16), transparent 55%);
  filter:blur(80px);
}

/* ================= PAGES ================= */

.page{display:none;padding:16px;}
.active{display:block;}

/* ================= PLAYER ================= */

.nowPlaying{
  width:340px;
  margin:50px auto;
  padding:20px;
  border-radius:26px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,255,120,0.2);
  text-align:center;
}

#albumCover{
  width:280px;
  height:280px;
  border-radius:22px;
  margin:0 auto 15px;
  background-size:cover;
}

/* ================= FRIENDS ================= */

.chatList{
  padding:10px;
}

.friendRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin:10px 0;
  background:rgba(255,255,255,0.04);
  border-radius:14px;
}

/* ================= CHAT ================= */

#chatPage{
  display:none;
  flex-direction:column;
  height:100vh;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  max-width:70%;
}

.me{background:rgba(0,255,120,0.2); margin-left:auto;}
.them{background:rgba(255,43,214,0.2);}

/* ================= INPUT ================= */

#msgInputBar{
  display:flex;
  padding:10px;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

/* ================= NAV ================= */

#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(10,10,10,0.9);
  border-top:1px solid rgba(0,255,120,0.2);
}

.navBtn{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
}

</style>
</head>

<body>

<div id="bg">
  <div class="waveGreen"></div>
</div>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="nowPlaying">
    <div id="albumCover"></div>
    <h2 id="title">Loading...</h2>
    <p id="meta"></p>

    <button id="generateBtn">Find Album</button>
  </div>

</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">

  <h3>Inbox</h3>
  <div id="friendsList"></div>

</div>

<!-- CHAT -->
<div id="chatPage">

  <h3 id="chatTitle"></h3>

  <div id="messages"></div>

  <div id="msgInputBar">
    <input id="msgInput" placeholder="Message...">
    <button id="sendMsgBtn">Send</button>
  </div>

</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn" class="navBtn">Home</button>
  <button id="friendsBtn" class="navBtn">Friends</button>
  <button id="profileBtn" class="navBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
