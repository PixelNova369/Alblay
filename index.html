<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
}

/* PAGES */
.page{
  display:none;
  padding:16px;
}

.active{
  display:block;
}

/* HOME WRAP */
.homeWrap{
  text-align:center;
  padding:20px;
}

/* ALBUM */
#albumCover{
  width:300px;
  height:300px;
  margin:20px auto;
  border-radius:22px;
  background-size:cover;
  background-position:center;
  box-shadow:0 25px 70px rgba(0,255,120,0.12);
  transition:all 0.3s ease;
}

/* NOW PLAYING */
#nowPlaying{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:15px;
}

.controls button{
  width:55px;
  height:55px;
  border-radius:50%;
  border:none;
  background:#1db954;
  color:black;
  font-size:18px;
}

/* BOTTOM BUTTONS */
.bottomControls{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.bottomControls button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

/* DRAWER */
.drawer{
  position:fixed;
  bottom:80px;
  left:0;
  right:0;
  background:#111;
  padding:16px;
  border-radius:16px 16px 0 0;
  transition:0.3s;
}

.hidden{
  transform:translateY(120%);
}

/* FRIENDS */
.friendRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:8px 0;
  background:#1a1a1a;
  border-radius:10px;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

button{
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:white;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="homeWrap">

    <h2>Now Playing</h2>

    <div id="albumCover"></div>

    <div id="nowPlaying">
      <h3 id="title">Loading...</h3>
      <p id="meta"></p>
    </div>

    <div class="controls">
      <button id="prevBtn">⟲</button>
      <button id="playBtn">▶</button>
      <button id="nextBtn">⟳</button>
    </div>

    <div class="bottomControls">
      <button id="drawerBtn">☰ Drawer</button>
      <button id="generateBtn">Find Album</button>
    </div>

    <!-- DRAWER (INSIDE HOME PAGE) -->
    <div id="drawerPanel" class="drawer hidden">

      <h3>Filters</h3>

      <input id="genre" placeholder="Genre">
      <input id="era" placeholder="Era">
      <input id="length" placeholder="Length">

      <button id="applyFilters">Apply</button>
      <button id="closeDrawer">Back</button>

    </div>

  </div>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h2>Friends</h2>
  <div id="friendsList"></div>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
</div>

<script src="./app.js"></script>

</body>
</html>
