<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  color:white;
  background:#050505;
  overflow:hidden;
}

/* 🌈 SPOTIFY WRAPPED BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-3;

  background:
    radial-gradient(circle at 20% 30%, rgba(29,185,84,0.45), transparent 45%),
    radial-gradient(circle at 80% 20%, rgba(120,80,255,0.35), transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(0,200,255,0.25), transparent 55%),
    radial-gradient(circle at 70% 70%, rgba(255,0,120,0.18), transparent 60%);

  filter: blur(80px) saturate(140%);
  animation: floatBg 12s ease-in-out infinite alternate;
}

@keyframes floatBg{
  0%{transform:scale(1) translateY(0);}
  100%{transform:scale(1.15) translateY(-30px);}
}

/* PAGES */
.page{
  display:none;
  padding:16px;
}

.active{ display:block; }

/* HOME */
.homeWrap{
  text-align:center;
  padding:20px;
}

/* ALBUM */
#albumCover{
  width:320px;
  height:320px;
  margin:24px auto;
  border-radius:28px;

  background-size:cover;
  background-position:center;

  box-shadow:
    0 30px 120px rgba(0,0,0,0.6),
    0 0 60px rgba(29,185,84,0.25);

  transition:0.5s ease;
}

/* NOW PLAYING */
#nowPlaying{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);

  padding:16px;
  border-radius:18px;

  backdrop-filter:blur(18px);
  box-shadow:0 25px 80px rgba(0,0,0,0.5);
}

/* 🎛 CONTROLS (CURVED SQUARES) */
.controls{
  display:flex;
  justify-content:center;
  gap:16px;
  margin-top:16px;
}

.controls button{
  width:66px;
  height:52px;
  flex:0 0 auto;

  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);

  background:rgba(255,255,255,0.06);
  color:white;

  backdrop-filter:blur(14px);
  box-shadow:0 10px 35px rgba(0,0,0,0.4);

  display:flex;
  align-items:center;
  justify-content:center;

  padding:0;
  transition:0.2s ease;
}

.controls button:active{
  transform:scale(0.96);
  background:rgba(29,185,84,0.18);
}

/* BOTTOM BUTTONS */
.bottomControls{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.bottomControls button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  color:white;
  backdrop-filter:blur(10px);
}

/* DRAWER */
.drawer{
  position:fixed;
  bottom:80px;
  left:0;
  right:0;
  background:#111;
  padding:16px;
  border-radius:18px 18px 0 0;
  transition:0.3s;
  box-shadow:0 -10px 40px rgba(0,0,0,0.6);
}

.hidden{
  transform:translateY(120%);
}

/* FRIENDS */
.friendRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:8px 0;
  background:rgba(255,255,255,0.06);
  border-radius:12px;
}

/* 🧭 BOTTOM NAV (INDIGO GLASS) */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;

  background:rgba(20,20,35,0.6);
  backdrop-filter:blur(20px);

  border-top:1px solid rgba(255,255,255,0.08);
}

#bottomNav button{
  flex:1;
  padding:16px;
  border:none;
  background:none;
  color:rgba(255,255,255,0.85);
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="homeWrap">

    <h2>Now Playing</h2>

    <div id="albumCover"></div>

    <div id="nowPlaying">
      <h3 id="title">Loading...</h3>
      <p id="meta"></p>
    </div>

    <div class="controls">
      <button id="prevBtn">⟲</button>
      <button id="playBtn">▶</button>
      <button id="nextBtn">⟳</button>
    </div>

    <div class="bottomControls">
      <button id="drawerBtn">☰ Drawer</button>
      <button id="generateBtn">Find Album</button>
    </div>

    <div id="drawerPanel" class="drawer hidden">
      <h3>Filters</h3>

      <input id="genre" placeholder="Genre">
      <input id="era" placeholder="Era">
      <input id="length" placeholder="Length">

      <button id="closeDrawer">Back</button>
    </div>

  </div>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h2>Friends</h2>
  <div id="friendsList"></div>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
</div>

<script src="./app.js"></script>

</body>
</html>
