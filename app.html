<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
}

/* LOGIN */
#authGate{
  position:fixed;
  inset:0;
  background:#050505;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  border-top:1px solid rgba(0,255,120,0.2);
}

.navBtn{
  flex:1;
  padding:14px;
  background:none;
  border:none;
  color:white;
}

/* PAGES */
.page{display:none;padding:16px;}
.active{display:block;}

/* HOME */
#albumCover{
  width:280px;
  height:280px;
  margin:20px auto;
  border-radius:18px;
  background:#222;
  background-size:cover;
}

/* FRIENDS UI (FIXED) */
.sectionBox{
  background:#121212;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
}

/* CHAT */
#chatPage{
  display:none;
  flex-direction:column;
  height:100vh;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg.me{
  background:rgba(0,255,120,0.2);
  margin-left:auto;
  padding:10px;
  border-radius:10px;
}

.msg.them{
  background:rgba(255,43,214,0.2);
  padding:10px;
  border-radius:10px;
}

#msgBar{
  display:flex;
  gap:10px;
  padding:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px 0;
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authGate">
  <h2>Alblay Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>
</div>

<!-- HOME -->
<div id="homePage" class="page active">
  <div id="albumCover"></div>
  <h2 id="title">Loading...</h2>
  <p id="meta"></p>
  <button id="generateBtn">Find Album</button>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">

  <!-- INBOX -->
  <div class="sectionBox">
    <h3>Inbox</h3>
    <div id="inbox">No requests</div>
  </div>

  <!-- FRIENDS LIST -->
  <div class="sectionBox">
    <h3>Friends</h3>
    <div id="friendsList">Loading...</div>
  </div>

  <!-- FIND FRIENDS -->
  <div class="sectionBox">
    <h3>Find Friends</h3>
    <input id="searchUser" placeholder="Search username">
    <button id="searchBtn">Search</button>
    <div id="searchResults"></div>
  </div>

</div>

<!-- CHAT -->
<div id="chatPage">
  <h3 id="chatTitle"></h3>
  <div id="messages"></div>

  <div id="msgBar">
    <input id="msgInput" placeholder="Message">
    <button id="sendBtn">Send</button>
  </div>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn" class="navBtn">Home</button>
  <button id="friendsBtn" class="navBtn">Friends</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
