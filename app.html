<!DOCTYPE html>
<html>

<head>
  <title>Alblay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:Arial; background:#0f0f0f; color:white; overflow-x:hidden;">

<!-- TOP -->
<div style="display:flex; justify-content:space-between; padding:15px; background:#111;">
  <div>Alblay</div>
  <button id="logoutBtn" style="background:#1DB954; border:none; padding:10px;">Logout</button>
</div>

<!-- HOME -->
<div id="homeView">

  <div style="text-align:center; margin-top:40px;">

    <div id="albumCover" style="width:80vw; max-width:350px; height:80vw; max-height:350px; background:#222; margin:auto; border-radius:12px;"></div>

    <h2 id="albumTitle"></h2>
    <p id="albumMeta"></p>

    <button id="generateBtn" style="padding:14px; background:#0A84FF; border:none; margin-top:10px;">
      Generate Album
    </button>

    <button id="playBtn" style="padding:14px; background:#1DB954; border:none;">
      ▶ Play
    </button>

    <button id="saveBtn" style="padding:14px; background:#FF9500; border:none;">
      Save to Wall
    </button>

  </div>

</div>

<!-- PROFILE -->
<div id="profileView" style="display:none; padding:20px;">
  <input id="username" placeholder="Username" style="padding:14px; width:100%;">
  <div id="albumWall"></div>
</div>

<!-- FRIENDS -->
<div id="friendsView" style="display:none; padding:20px;">
  <h2>Friends</h2>
</div>

<!-- NAV -->
<div style="position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#111; padding:10px;">
  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="friendsBtn">Friends</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
