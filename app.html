<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#authGate{
  position:fixed;
  inset:0;
  background:#050505;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

input{
  width:80%;
  padding:12px;
  margin:6px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  background:#1db954;
  color:black;
  font-weight:bold;
}

/* HOME NOW PLAYING */
#homePage{
  display:none;
  padding:20px;
  text-align:center;
}

#albumCover{
  width:300px;
  height:300px;
  margin:20px auto;
  border-radius:20px;
  background-size:cover;
  background-position:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

#nowPlayingBox{
  background:#111;
  border-radius:16px;
  padding:12px;
  margin-top:10px;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.navBtn{
  flex:1;
  padding:14px;
  background:none;
  border:none;
  color:white;
}

/* FRIENDS */
.page{
  display:none;
  padding:16px;
}

.active{
  display:block;
}

.friendRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:10px 0;
  background:#1a1a1a;
  border-radius:12px;
}

/* CHAT */
#chatPage{
  display:none;
  flex-direction:column;
  height:100vh;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  padding:10px;
  border-radius:10px;
  margin:6px 0;
}

.me{background:rgba(0,255,120,0.2); margin-left:auto;}
.them{background:rgba(255,255,255,0.1);}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authGate">
  <h2>Alblay Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>
</div>

<!-- HOME -->
<div id="homePage">

  <h2>Now Playing</h2>

  <div id="albumCover"></div>

  <div id="nowPlayingBox">
    <h3 id="title">Loading...</h3>
    <p id="meta"></p>
  </div>

  <button id="generateBtn">Find Album</button>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h2>Friends</h2>
  <div id="friendsList"></div>
</div>

<!-- CHAT -->
<div id="chatPage">
  <h3 id="chatTitle"></h3>
  <div id="messages"></div>

  <input id="msgInput" placeholder="Message">
  <button id="sendBtn">Send</button>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn" class="navBtn">Home</button>
  <button id="friendsBtn" class="navBtn">Friends</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
