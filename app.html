<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  padding-bottom:80px;
}

.page{ display:none; padding:20px; }
.active{ display:block; }

button{
  background:rgba(255,255,255,0.06);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:12px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

/* ALBUM */
#albumCover{
  width:320px;
  height:320px;
  margin:20px auto;
  border-radius:22px;
  background-size:cover;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:12px;
}

/* CHAT */
#chatMessages{
  height:55vh;
  overflow-y:auto;
  background:rgba(255,255,255,0.04);
  padding:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">
  <div id="albumCover"></div>
  <h2 id="title">Loading...</h2>
  <p id="meta"></p>

  <button id="generateBtn">Find Album</button>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">

  <h3>Find Friend (Email)</h3>
  <input id="friendEmail" placeholder="Enter email">
  <button id="sendRequestBtn">Send Request</button>

  <hr>

  <h3>Inbox</h3>
  <button id="inboxBtn">Open Inbox</button>
  <div id="inboxBox"></div>

  <hr>

  <h3>Your Friends</h3>
  <div id="friendsList"></div>

</div>

<!-- CHAT -->
<div id="chatPage" class="page">

  <button id="backBtn">← Back</button>

  <h3 id="chatTitle">Chat</h3>

  <div id="chatMessages"></div>

  <input id="chatInput" placeholder="Message">
  <button id="sendMsgBtn">Send</button>

  <button id="sendAlbumBtn">🎧 Send Album</button>

</div>

<!-- PROFILE -->
<div id="profilePage" class="page">

  <h3>Profile</h3>

  <input id="avatarInput" type="file" accept="image/*">

  <div>
    <img id="avatarPreview" style="width:80px;height:80px;border-radius:50%;">
    <h3 id="usernamePreview">Guest</h3>
  </div>

</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
  <button id="profileBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
