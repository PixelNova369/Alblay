<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alblay</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial;
      overflow-x: hidden;
      padding-bottom: 90px; /* prevents bottom nav overlap */
    }

    #albumCover {
      width: 300px;
      height: 300px;
      margin: 20px auto;
      background: #222;
      border-radius: 16px;
      background-size: cover;
      background-position: center;
      transition: 0.2s ease;
    }

    /* DRAWER */
    #drawerPanel {
      position: fixed;
      top: 0;
      right: -320px;
      width: 320px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.3s ease;
      z-index: 999;
    }

    #bottomNav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111;
      display: flex;
      justify-content: space-around;
      padding: 15px;
      z-index: 1000;
    }

    button {
      background: #222;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    #friendsPanel {
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- MAIN -->
  <div style="text-align:center; padding:20px;">
    <h1>Alblay</h1>

    <!-- DRAWER -->
    <div id="drawerPanel">
      <h3>Filters</h3>

      <button id="drawerBackBtn">Close</button>

      <p>Era</p>
      <select>
        <option>Any</option>
        <option>70s</option>
        <option>80s</option>
        <option>90s</option>
        <option>2000s</option>
        <option>2010s+</option>
      </select>

      <p>Genre</p>
      <select id="genreFilter">
        <option>Any</option>
        <option>rock</option>
        <option>pop</option>
        <option>electronic</option>
        <option>hip-hop</option>
      </select>

      <p>Length</p>
      <select>
        <option>Any</option>
        <option>Short</option>
        <option>Medium</option>
        <option>Long</option>
      </select>
    </div>

    <!-- ALBUM -->
    <div id="albumCover"></div>

    <h2 id="title">No Album Loaded</h2>
    <p id="meta"></p>

    <!-- CONTROLS -->
    <div>
      <button id="prevBtn">◀</button>
      <button id="playBtn">Play</button>
      <button id="nextBtn">▶</button>
      <button id="drawerBtn">☰</button>
    </div>

    <br>

    <button id="generateBtn">Generate Album</button>
  </div>

  <!-- FRIEND SYSTEM -->
  <div id="friendsPanel">

    <h3>Friends</h3>

    <input id="friendIdInput" placeholder="Friend ID">
    <button id="sendFriendBtn">Send Friend Request</button>

    <input id="shareFriendId" placeholder="Friend ID to share album">
    <button id="shareAlbumBtn">Share Album</button>

    <h4>Inbox</h4>
    <div id="inbox"></div>

  </div>

  <!-- BOTTOM NAV -->
  <div id="bottomNav">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="friendsBtn">Friends</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
