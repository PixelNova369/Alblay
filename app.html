<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alblay</title>
</head>

<body style="
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  overflow-x:hidden;
">

<!-- BACKGROUND OVERLAY -->
<div style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
"></div>

<div style="padding:20px;text-align:center;">

  <h1>Alblay</h1>

  <!-- DRAWER -->
  <div id="drawerPanel" style="
    position:fixed;
    top:0;
    right:-320px;
    width:320px;
    height:100%;
    background:rgba(17,17,17,0.95);
    backdrop-filter: blur(12px);
    color:white;
    transition:0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    padding:20px;
    box-shadow:-20px 0 40px rgba(0,0,0,0.6);
    z-index:999;
  ">

    <h3>Filters</h3>

    <button id="drawerBackBtn" style="
      background:none;
      border:none;
      color:white;
      font-size:18px;
      margin-bottom:10px;
    ">
      ← Back
    </button>

    <p>Era</p>
    <select>
      <option>Any</option>
      <option>70s</option>
      <option>80s</option>
      <option>90s</option>
      <option>2000s</option>
      <option>2010s+</option>
    </select>

    <p>Genre</p>
    <select>
      <option>Any</option>
      <option>Pop</option>
      <option>Rock</option>
      <option>Hip-Hop</option>
      <option>Electronic</option>
    </select>

    <p>Length</p>
    <select>
      <option>Any</option>
      <option>Short</option>
      <option>Medium</option>
      <option>Long</option>
    </select>

  </div>

  <!-- ALBUM CARD -->
  <div style="
    backdrop-filter: blur(10px);
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
    max-width:340px;
    margin:0 auto;
  ">

    <div id="albumCover" style="
      width:300px;
      height:300px;
      margin:20px auto;
      background:#222;
      border-radius:16px;
      background-size:cover;
      background-position:center;
    "></div>

    <h2 id="title">No Album Loaded</h2>
    <p id="meta"></p>

    <!-- CONTROLS -->
    <div>
      <button id="prevBtn">◀</button>
      <button id="playBtn">Play</button>
      <button id="nextBtn">▶</button>
      <button id="drawerBtn">☰</button>
    </div>

    <br>

    <button id="generateBtn">Generate Album</button>
    <button id="saveBtn">Save To Wall</button>

  </div>
</div>

<!-- BOTTOM NAV (FIXED) -->
<div style="
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:15px;
  box-sizing:border-box;
  z-index:1000;
">

  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="friendsBtn">Friends</button>

</div>

<script src="./app.js"></script>
</body>
</html>
