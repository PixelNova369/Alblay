<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alblay</title>
</head>

<body style="margin:0; font-family:Arial; background:black; color:white;">

<!-- TOP -->
<div style="display:flex; justify-content:space-between; padding:14px; background:#111;">
  <div>Alblay</div>
  <button id="logoutBtn">Logout</button>
</div>

<!-- MAIN -->
<div id="app" style="padding:20px; text-align:center;">

  <div id="albumCover" style="
    width:80vw;
    height:80vw;
    max-width:320px;
    max-height:320px;
    margin:auto;
    background:#222;
    border-radius:16px;
    background-size:cover;
    background-position:center;
  "></div>

  <h2 id="title"></h2>
  <p id="meta"></p>

  <button id="prevBtn">⟵ Prev</button>
  <button id="playBtn">Play</button>
  <button id="nextBtn">Next ⟶</button>

  <br><br>

  <button id="generateBtn" style="background:#1DB954; padding:12px;">Generate Album</button>
  <button id="saveBtn" style="background:#0A84FF; padding:12px;">Save</button>

</div>

<!-- NAV -->
<div style="
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:12px;
">

  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="friendsBtn">Friends</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
