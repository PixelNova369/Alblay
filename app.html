<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alblay</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial;
      overflow-x: hidden;
      padding-bottom: 90px;
      transition: 0.4s ease;
    }

    #albumCover {
      width: 300px;
      height: 300px;
      margin: 20px auto;
      background: #222;
      border-radius: 16px;
      background-size: cover;
      background-position: center;
      transition: 0.25s ease;
      position: relative;
      z-index: 2;
    }

    button {
      background: #222;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      margin: 3px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

    .page { display: none; padding: 20px; }
    .active { display: block; }

    #bottomNav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111;
      display: flex;
      justify-content: space-around;
      padding: 12px;
      z-index: 1000;
    }

    /* BLUR LAYER */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      filter: blur(25px);
      transform: scale(1.1);
      z-index: -1;
      transition: 0.4s ease;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">

  <h2 style="text-align:center;">Alblay</h2>

  <div id="albumCover"></div>

  <h3 id="title">No Album</h3>
  <p id="meta"></p>

  <div style="text-align:center;">
    <button id="prevBtn">◀</button>
    <button id="playBtn">Play</button>
    <button id="nextBtn">▶</button>
  </div>

  <div style="text-align:center;">
    <button id="generateBtn">Generate</button>
  </div>

</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">

  <h3>Friends</h3>

  <input id="friendIdInput" placeholder="Friend ID">
  <button id="sendFriendBtn">Send Friend Request</button>

  <h4>Incoming Requests</h4>
  <div id="friendRequests"></div>

  <h4>Your Friends</h4>
  <div id="friendsList"></div>

  <h4>Inbox</h4>
  <div id="inbox"></div>

</div>

<!-- PROFILE -->
<div id="profilePage" class="page">
  <h3>Profile</h3>
  <p>Coming soon</p>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
  <button id="profileBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
