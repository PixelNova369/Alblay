<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial;
  background:#050505;
  color:white;
  overflow-x:hidden;
  padding-bottom:90px;
}

/* WRAPPED BACKGROUND */
#bg {
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(29,185,84,0.25), transparent 40%),
    radial-gradient(circle at 80% 10%, rgba(255,59,48,0.18), transparent 45%),
    radial-gradient(circle at 40% 90%, rgba(10,132,255,0.18), transparent 45%);
  filter: blur(50px);
}

/* PAGES */
.page { display:none; padding:20px; }
.active { display:block; }

/* ALBUM */
#albumCover {
  width:320px;
  height:320px;
  margin:20px auto;
  border-radius:22px;
  background-size:cover;
  background-position:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  transition:0.3s ease;
}

/* BUTTONS */
button {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  padding:10px 14px;
  border-radius:14px;
  backdrop-filter: blur(12px);
}

button:hover { transform:scale(1.05); }

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

/* DRAWER */
#drawer {
  position:fixed;
  right:-340px;
  top:0;
  width:320px;
  height:100%;
  background:rgba(20,20,20,0.9);
  backdrop-filter:blur(20px);
  padding:20px;
  transition:0.3s ease;
  z-index:999;
}

#drawer.open { right:0; }

/* CARDS */
.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);
  padding:12px;
  border-radius:14px;
  margin:8px 0;
}

/* NAV */
#bottomNav {
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(15,15,15,0.8);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:space-around;
  padding:12px;
  border-top:1px solid rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- DRAWER -->
<div id="drawer">
  <h3>Filters</h3>
  <button id="closeDrawer">Close</button>
  <p>Genre</p>
  <input placeholder="rock / pop / chill">
</div>

<!-- HOME -->
<div id="homePage" class="page active">

  <div id="albumCover"></div>

  <h2 id="title">Loading...</h2>
  <p id="meta"></p>

  <div>
    <button id="prevBtn">◀</button>
    <button id="playBtn">Play</button>
    <button id="nextBtn">▶</button>
    <button id="drawerBtn">☰</button>
  </div>

  <button id="generateBtn">Surprise Me</button>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">

  <h3>Friends</h3>

  <input id="friendUsernameInput" placeholder="Friend username">
  <button id="sendFriendBtn">Send Request</button>

  <h4>Suggested Friends</h4>
  <div id="suggestedFriends"></div>

  <h4>Send Album</h4>
  <input id="shareUsername" placeholder="Friend username">
  <button id="sendAlbumBtn">Send Current Album</button>

  <h4>Inbox</h4>
  <div id="inbox"></div>

  <h4>Friends</h4>
  <div id="friendsList"></div>

</div>

<!-- PROFILE -->
<div id="profilePage" class="page">

  <h3>Profile</h3>

  <input id="usernameInput" placeholder="Username">
  <input id="avatarInput" placeholder="Avatar URL">

  <button id="saveProfileBtn">Save</button>

  <div class="card">
    <img id="avatarPreview" style="width:60px;height:60px;border-radius:50%;">
    <h4 id="namePreview">Guest</h4>
  </div>

</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
  <button id="profileBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
