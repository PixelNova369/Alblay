<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  padding-bottom:80px;
}

#bg{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(29,185,84,0.25), transparent 40%),
    radial-gradient(circle at 80% 10%, rgba(255,59,48,0.18), transparent 45%),
    radial-gradient(circle at 40% 90%, rgba(10,132,255,0.18), transparent 45%);
  filter:blur(60px);
}

.page{ display:none; padding:20px; }
.active{ display:block; }

/* ALBUM */
#albumCover{
  width:320px;
  height:320px;
  margin:20px auto;
  border-radius:22px;
  background-size:cover;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

/* BUTTONS */
button{
  background:rgba(255,255,255,0.06);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:12px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

/* PROFILE CARD */
.profileCard{
  background:rgba(255,255,255,0.06);
  padding:16px;
  border-radius:16px;
  text-align:center;
  margin-top:20px;
}

.profilePic{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(15,15,15,0.9);
  display:flex;
  justify-content:space-around;
  padding:12px;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- HOME -->
<div id="homePage" class="page active">
  <div id="albumCover"></div>

  <h2 id="title">Loading...</h2>
  <p id="meta"></p>

  <button id="generateBtn">Find Album</button>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">

  <h3>Messages</h3>

<h3>Find Friend</h3>

<input id="friendEmail" placeholder="Enter email">
<button id="sendRequestBtn">Send Request</button>

<hr>

<h3>Friend Requests</h3>
<div id="friendRequests"></div>

<hr>

<h3>Your Friends</h3>
<div id="friendsList"></div>
</div>

<!-- PROFILE -->
<div id="profilePage" class="page">

  <h3>Profile</h3>

  <p id="displayName">Guest</p>

  <!-- IMAGE PICKER (CAMERA / GALLERY) -->
  <input id="avatarInput" type="file" accept="image/*" capture>

  <div class="profileCard">
    <img id="avatarPreview" class="profilePic">
    <h3 id="usernamePreview">Guest</h3>
  </div>

</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Messages</button>
  <button id="profileBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
