<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  border-top:1px solid rgba(0,255,120,0.2);
}

.navBtn{
  flex:1;
  padding:14px;
  background:none;
  border:none;
  color:white;
}

/* PAGES */
.page{display:none;padding:16px;}
.active{display:block;}

/* HOME */
#albumCover{
  width:280px;
  height:280px;
  margin:20px auto;
  border-radius:18px;
  background:#222;
  background-size:cover;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

/* FRIENDS */
.friendRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:10px 0;
  background:#1a1a1a;
  border-radius:12px;
}

/* CHAT */
#chatPage{
  display:none;
  height:100vh;
  flex-direction:column;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg.me{background:rgba(0,255,120,0.2);margin-left:auto;padding:10px;border-radius:10px;}
.msg.them{background:rgba(255,43,214,0.2);padding:10px;border-radius:10px;}

#msgBar{
  display:flex;
  gap:10px;
  padding:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">

  <div id="albumCover"></div>

  <h2 id="title">Loading...</h2>
  <p id="meta"></p>

  <button id="generateBtn">Find Album</button>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h3>Friends</h3>
  <div id="friendsList"></div>
</div>

<!-- CHAT -->
<div id="chatPage">
  <h3 id="chatTitle"></h3>

  <div id="messages"></div>

  <div id="msgBar">
    <input id="msgInput" placeholder="Message">
    <button id="sendBtn">Send</button>
  </div>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn" class="navBtn">Home</button>
  <button id="friendsBtn" class="navBtn">Friends</button>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
