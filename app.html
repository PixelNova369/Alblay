<!DOCTYPE html>

<html>

<head>

  <title>Alblay App</title>

</head>

<body style="margin:0; font-family:Arial; background:#0f0f0f; color:white;">

  <!-- TOP BAR -->

  <div style="

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:20px 40px;

    background:#111;

    border-bottom:1px solid #222;

  ">

    <div style="font-size:28px; font-weight:600; display:flex; letter-spacing:-1px;">

      <span style="color:#FF3B30;">a</span>

      <span style="color:#FF9500;">l</span>

      <span style="color:#FFCC00;">b</span>

      <span style="color:#34C759;">l</span>

      <span style="color:#0A84FF;">a</span>

      <span style="color:#AF52DE;">y</span>

    </div>

    <div>

      <button id="menuBtn" style="

        background:#222;

        color:white;

        border:none;

        padding:10px 14px;

        border-radius:8px;

        margin-right:10px;

      ">

        ☰ Menu

      </button>

      <button id="logoutBtn" style="

        background:#1DB954;

        border:none;

        padding:10px 16px;

        border-radius:6px;

        font-weight:bold;

      ">

        Logout

      </button>

    </div>

  </div>

  <!-- FILTER PANEL -->

  <div id="filterPanel" style="

    display:none;

    padding:20px 40px;

    background:#151515;

    gap:20px;

    flex-wrap:wrap;

  ">

    <select id="era" style="padding:12px;">

      <option value="">Any Era</option>

      <option>1960s</option>

      <option>1970s</option>

      <option>1980s</option>

      <option>1990s</option>

      <option>2000s</option>

      <option>2010s</option>

      <option>2020s</option>

    </select>

    <select id="genre" style="padding:12px;">

      <option value="">Any Genre</option>

      <option>Rock</option>

      <option>Pop</option>

      <option>Hip Hop</option>

      <option>Electronic</option>

    </select>

    <select id="length" style="padding:12px;">

      <option value="">Any Length</option>

      <option>Short</option>

      <option>Medium</option>

      <option>Long</option>

    </select>

  </div>

  <!-- MAIN CONTENT -->

  <div style="

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    min-height:80vh;

    gap:25px;

    padding:40px;

  ">

    <button id="saveBtn" style="

      width:500px;

      max-width:90%;

      padding:24px;

      font-size:28px;

      font-weight:bold;

      background:#1DB954;

      border:none;

      border-radius:16px;

    ">

      Generate Album

    </button>

    <div id="result" style="

      width:700px;

      max-width:95%;

      text-align:center;

    ">

    </div>

  </div>

  <script type="module" src="app.js"></script>

</body>

</html>
