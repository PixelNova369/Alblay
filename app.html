<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  padding-bottom:80px;
}

.page{ display:none; padding:20px; }
.active{ display:block; }

button{
  background:rgba(255,255,255,0.06);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:12px;
}

/* ALBUM */
#albumCover{
  width:320px;
  height:320px;
  margin:20px auto;
  border-radius:22px;
  background-size:cover;
}

/* DRAWER */
#drawer{
  position:fixed;
  top:0;
  right:-300px;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

/* INBOX DROPDOWN */
#inbox{
  position:absolute;
  top:50px;
  right:10px;
  background:#111;
  width:220px;
  padding:10px;
  display:none;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:12px;
}

/* CHAT */
#chatBox{
  height:55vh;
  overflow-y:auto;
  background:#111;
  padding:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">

  <!-- DRAWER -->
  <div id="drawer">
    <h3>Filters</h3>
    <button onclick="toggleDrawer()">Close</button>
  </div>

  <button onclick="toggleDrawer()">☰</button>

  <!-- INBOX -->
  <button id="inboxBtn">📥 Inbox</button>
  <div id="inbox"></div>

  <div id="albumCover"></div>

  <h2 id="title"></h2>
  <p id="meta"></p>

  <!-- CONTROLS -->
  <button id="prevBtn">⏮</button>
  <button id="playBtn">▶</button>
  <button id="nextBtn">⏭</button>

  <button id="generateBtn">Find Album</button>

</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">

  <h3>Friends</h3>
  <div id="friendsList"></div>

</div>

<!-- CHAT -->
<div id="chatPage" class="page">

  <button id="backBtn">← Back</button>

  <h3 id="chatTitle"></h3>

  <div id="chatBox"></div>

  <input id="msgInput" placeholder="Message">
  <button id="sendMsg">Send</button>

  <button id="sendAlbum">🎧 Send Album</button>

</div>

<!-- PROFILE -->
<div id="profilePage" class="page">
  <h3>Profile</h3>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
  <button id="profileBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
