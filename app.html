<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  overflow:hidden;
}

/* =======================
   BACKGROUND
======================= */
#bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:#050505;
  overflow:hidden;
}

.waveLayer{
  position:absolute;
  inset:-200px;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,120,0.22), transparent 45%),
    radial-gradient(circle at 70% 20%, rgba(0,255,140,0.16), transparent 55%),
    radial-gradient(circle at 50% 80%, rgba(0,255,100,0.12), transparent 60%);
  filter:blur(80px);
  animation:waveMove 14s ease-in-out infinite;
}

@keyframes waveMove{
  0%{transform:translate(0,0);}
  50%{transform:translate(-40px,20px);}
  100%{transform:translate(0,0);}
}

/* =======================
   PAGES
======================= */
.page{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* =======================
   PLAYER CARD
======================= */
.nowPlaying{
  width:340px;
  margin:60px auto;
  padding:20px;
  border-radius:28px;

  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,255,120,0.25);

  backdrop-filter: blur(16px);

  box-shadow:
    0 0 30px rgba(0,255,120,0.12),
    0 40px 100px rgba(0,0,0,0.8);

  text-align:center;
}

#albumCover{
  width:280px;
  height:280px;
  margin:0 auto 15px;
  border-radius:22px;
  background-size:cover;
  background-position:center;
  transition:0.5s ease;
}

/* =======================
   BUTTONS
======================= */
button{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  padding:10px 14px;
  border-radius:14px;
}

/* =======================
   DRAWER (FIXED)
======================= */
#drawerPanel{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:#0f0f0f;
  padding:20px;
  z-index:999;

  transform:translateX(100%);
  transition:0.35s cubic-bezier(.2,.8,.2,1);

  border-left:1px solid rgba(0,255,120,0.2);
}

#drawerPanel.open{
  transform:translateX(0%);
}

/* =======================
   BOTTOM NAV (FIXED + NEON OUTLINE)
======================= */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;

  background:rgba(10,10,10,0.9);
  backdrop-filter: blur(12px);

  border-top:1px solid rgba(0,255,120,0.25);
  box-shadow:0 -10px 30px rgba(0,255,120,0.08);
}

/* active tab glow */
.navBtn{
  position:relative;
}

.navBtn.active{
  border:1px solid rgba(0,255,120,0.5);
  box-shadow:0 0 12px rgba(0,255,120,0.2);
}
</style>
</head>

<body>

<div id="bg">
  <div class="waveLayer"></div>
</div>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="nowPlaying">
    <div id="albumCover"></div>

    <h2 id="title">Loading...</h2>
    <p id="meta"></p>

    <div>
      <button id="prevBtn">Prev</button>
      <button id="playBtn">Play</button>
      <button id="nextBtn">Next</button>
    </div>

    <div style="margin-top:12px;">
      <button id="drawerBtn">Filters</button>
      <button id="generateBtn">Generate</button>
    </div>
  </div>

</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h3>Friends</h3>
</div>

<!-- PROFILE -->
<div id="profilePage" class="page">
  <h3>Profile</h3>
</div>

<!-- DRAWER -->
<div id="drawerPanel">

  <h3>Filters</h3>

  <h4>Genre</h4>
  <select id="genreFilter">
    <option>Any</option>
    <option>rock</option>
    <option>pop</option>
    <option>electronic</option>
  </select>

  <h4>Era</h4>
  <select id="eraFilter">
    <option>Any</option>
    <option>60s</option>
    <option>70s</option>
    <option>80s</option>
    <option>90s</option>
    <option>2000s+</option>
  </select>

  <h4>Length</h4>
  <select id="lengthFilter">
    <option>Any</option>
    <option>Short</option>
    <option>Medium</option>
    <option>Long</option>
  </select>

  <button id="closeDrawerBtn" style="margin-top:20px;width:100%;">
    Back
  </button>

</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn" class="navBtn active">Home</button>
  <button id="friendsBtn" class="navBtn">Friends</button>
  <button id="profileBtn" class="navBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
