  <!-- MAIN CONTENT -->
  <div style="
    display:grid;
    grid-template-columns: 1fr 2fr;
    gap:30px;
    padding:30px;
  ">

    <!-- GENERATOR -->
    <div style="background:#151515; padding:20px; border-radius:10px;">
      <h3>Create Album</h3>

      <input id="title" placeholder="Title" style="width:100%; margin:5px 0; padding:10px;" />
      <input id="genre" placeholder="Genre" style="width:100%; margin:5px 0; padding:10px;" />
      <input id="era" placeholder="Era" style="width:100%; margin:5px 0; padding:10px;" />
      <input id="image" placeholder="Image URL" style="width:100%; margin:5px 0; padding:10px;" />
      <input id="spotify" placeholder="Spotify link" style="width:100%; margin:5px 0; padding:10px;" />

      <button id="saveBtn" style="
        width:100%;
        margin-top:10px;
        background:#1DB954;
        border:none;
        padding:12px;
        font-weight:bold;
      ">
        Save Album
      </button>
    </div>

    <!-- ALBUM WALL -->
    <div>
      <h3>Your Albums</h3>
      <div id="albumWall" style="
        display:grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap:20px;
      "></div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
