<!DOCTYPE html>
<html>

<head>
  <title>Alblay App</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f0f0f; color:white;">

  <!-- TOP BAR -->
  <div style="
    display:flex;
    justify-content:space-between;
    padding:20px;
    background:#111;
  ">

    <div style="font-size:26px;">
      <span style="color:#FF3B30;">a</span>
      <span style="color:#FF9500;">l</span>
      <span style="color:#FFCC00;">b</span>
      <span style="color:#34C759;">l</span>
      <span style="color:#0A84FF;">a</span>
      <span style="color:#AF52DE;">y</span>
    </div>

    <button id="logoutBtn" style="background:#1DB954; border:none; padding:10px;">
      Logout
    </button>

  </div>

  <!-- CONTROLS -->
  <div style="padding:20px; display:flex; gap:10px; flex-wrap:wrap;">

    <select id="genre">
      <option value="">Any Genre</option>
      <option>Rock</option>
      <option>Pop</option>
      <option>Hip Hop</option>
      <option>Electronic</option>
    </select>

    <select id="era">
      <option value="">Any Era</option>
      <option>1980s</option>
      <option>1990s</option>
      <option>2000s</option>
      <option>2010s</option>
      <option>2020s</option>
    </select>

    <button id="generateBtn" style="background:#1DB954; border:none; padding:10px;">
      Generate Album
    </button>

    <button id="saveBtn" style="background:#0A84FF; border:none; padding:10px;">
      Save to Wall
    </button>

  </div>

  <!-- ALBUM DISPLAY -->
  <div style="text-align:center; margin-top:40px;">

    <div id="albumCover" style="
      width:300px;
      height:300px;
      margin:0 auto;
      background:#222;
      border-radius:12px;
    "></div>

    <h2 id="albumTitle"></h2>
    <p id="albumArtist"></p>
    <p id="albumMeta"></p>

    <button id="playBtn"
      style="margin-top:10px; padding:12px 20px; background:#1DB954; border:none;">
      ▶ Play on Spotify
    </button>

  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
