<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* WRAPPED BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 30%, rgba(29,185,84,0.2), transparent 40%),
    radial-gradient(circle at 80% 10%, rgba(255,59,48,0.15), transparent 45%),
    radial-gradient(circle at 40% 90%, rgba(10,132,255,0.15), transparent 45%);
  filter: blur(60px);
}

/* WAVE MOTION */
.waveLayer{
  position:fixed;
  inset:-200px;
  z-index:-1;
  background:
    radial-gradient(circle at 30% 30%, rgba(29,185,84,0.18), transparent 40%),
    radial-gradient(circle at 70% 20%, rgba(255,59,48,0.12), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(10,132,255,0.12), transparent 45%);
  filter: blur(70px);
  animation: waveMove 10s ease-in-out infinite;
}

@keyframes waveMove{
  0%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-25px,15px) scale(1.05); }
  100%{ transform:translate(0,0) scale(1); }
}

/* PAGES */
.page{ display:none; padding:20px; }
.active{ display:block; }

/* PLAYER */
.nowPlaying{
  max-width:360px;
  margin:40px auto;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-radius:24px;
  text-align:center;
}

/* ALBUM */
#albumCover{
  width:280px;
  height:280px;
  margin:0 auto 15px;
  border-radius:20px;
  background-size:cover;
  background-position:center;
  transition:0.5s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

/* BUTTONS */
button{
  background:rgba(255,255,255,0.06);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:14px;
  font-size:14px;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:10px;
}

/* LOWER */
.lowerActions{
  display:flex;
  justify-content:space-between;
  margin-top:16px;
}

/* DRAWER */
#drawerPanel{
  position:fixed;
  top:0;
  right:-320px;
  width:320px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s ease;
  z-index:999;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:#111;
}

select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>
<div class="waveLayer"></div>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="nowPlaying">

    <div id="albumCover"></div>

    <h2 id="title">Loading...</h2>
    <p id="meta"></p>

    <div class="controls">
      <button id="prevBtn">Prev</button>
      <button id="playBtn">Play</button>
      <button id="nextBtn">Next</button>
    </div>

    <div class="lowerActions">
      <button id="drawerBtn">Filters</button>
      <button id="generateBtn">Generate</button>
    </div>

  </div>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h3>Friends</h3>
</div>

<!-- PROFILE -->
<div id="profilePage" class="page">
  <h3>Profile</h3>
</div>

<!-- DRAWER -->
<div id="drawerPanel">

  <h3>Filters</h3>

  <button id="closeDrawerBtn">Back</button>

  <h4>Genre</h4>
  <select id="genreFilter">
    <option>Any</option>
    <option>rock</option>
    <option>pop</option>
    <option>electronic</option>
  </select>

  <h4>Era</h4>
  <select id="eraFilter">
    <option>Any</option>
    <option>60s</option>
    <option>70s</option>
    <option>80s</option>
    <option>90s</option>
    <option>2000s+</option>
  </select>

  <h4>Length</h4>
  <select id="lengthFilter">
    <option>Any</option>
    <option>Short</option>
    <option>Medium</option>
    <option>Long</option>
  </select>

</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
  <button id="profileBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
