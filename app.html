<!DOCTYPE html>
<html>

<head>
  <title>Alblay App</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f0f0f; color:white; overflow:hidden;">

  <!-- TOP BAR -->
  <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#111;
    border-bottom:1px solid #222;
  ">

    <div style="font-size:28px; font-weight:600; display:flex; letter-spacing:-1px;">
      <span style="color:#FF3B30;">a</span>
      <span style="color:#FF9500;">l</span>
      <span style="color:#FFCC00;">b</span>
      <span style="color:#34C759;">l</span>
      <span style="color:#0A84FF;">a</span>
      <span style="color:#AF52DE;">y</span>
    </div>

    <div>
      <button id="menuBtn" style="
        background:#222;
        color:white;
        border:none;
        padding:10px 14px;
        border-radius:8px;
        margin-right:10px;
      ">☰</button>

      <button id="logoutBtn" style="
        background:#1DB954;
        border:none;
        padding:10px 16px;
        border-radius:6px;
        font-weight:bold;
      ">Logout</button>
    </div>

  </div>

  <!-- LEFT DRAWER -->
  <div id="filterPanel" style="
    position:absolute;
    top:80px;
    left:0;
    width:260px;
    height:calc(100vh - 80px);
    background:#151515;
    padding:20px;
    display:none;
    flex-direction:column;
    gap:15px;
    border-right:1px solid #222;
  ">

    <select id="era" style="padding:12px;">
      <option value="">Any Era</option>
      <option>1960s</option>
      <option>1970s</option>
      <option>1980s</option>
      <option>1990s</option>
      <option>2000s</option>
      <option>2010s</option>
      <option>2020s</option>
    </select>

    <select id="genre" style="padding:12px;">
      <option value="">Any Genre</option>
      <option>Rock</option>
      <option>Pop</option>
      <option>Hip Hop</option>
      <option>Electronic</option>
    </select>

    <select id="length" style="padding:12px;">
      <option value="">Any Length</option>
      <option>Short</option>
      <option>Medium</option>
      <option>Long</option>
    </select>

    <button id="generateBtn" style="
      padding:16px;
      background:#1DB954;
      border:none;
      border-radius:10px;
      font-weight:bold;
    ">Generate</button>

    <button id="saveBtn" style="
      padding:16px;
      background:#0A84FF;
      border:none;
      border-radius:10px;
      font-weight:bold;
    ">Save</button>

  </div>

  <!-- CENTER PLAYER -->
  <div style="
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
  ">

    <button id="prevBtn" style="
      position:absolute;
      left:30px;
      font-size:40px;
      background:none;
      border:none;
      color:white;
      cursor:pointer;
    ">‹</button>

    <div id="albumCard" style="
      width:420px;
      text-align:center;
      transition:all 0.35s ease;
    ">

      <div id="albumCover" style="
        width:320px;
        height:320px;
        margin:0 auto 20px auto;
        background:#222;
        border-radius:16px;
      "></div>

      <h2 id="albumTitle">Generate an album</h2>
      <p id="albumArtist"></p>
      <p id="albumMeta"></p>

      <button id="playBtn" style="
        margin-top:20px;
        padding:14px 24px;
        border:none;
        border-radius:30px;
        background:#1DB954;
        font-weight:bold;
        cursor:pointer;
      ">▶ Play on Spotify</button>

    </div>

    <button id="nextBtn" style="
      position:absolute;
      right:30px;
      font-size:40px;
      background:none;
      border:none;
      color:white;
      cursor:pointer;
    ">›</button>

  </div>

  <!-- ALBUM WALL -->
  <div id="albumWall" style="
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    background:#0f0f0f;
  "></div>

  <script type="module" src="app.js"></script>
</body>

</html>
