<!DOCTYPE html>
<html>

<head>
  <title>Alblay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:Arial; background:black; color:white; overflow:hidden;">

<!-- BLURRED BACKGROUND -->
<div id="bg" style="
  position:fixed;
  inset:0;
  background:#000;
  background-size:cover;
  background-position:center;
  filter:blur(40px) brightness(0.4);
  transform:scale(1.2);
  z-index:0;
"></div>

<!-- OVERLAY -->
<div style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1;"></div>

<!-- TOP BAR -->
<div style="position:relative; z-index:2; display:flex; justify-content:space-between; padding:14px;">
  <div>Alblay</div>
  <button id="logoutBtn" style="background:#1DB954; border:none; padding:10px;">Logout</button>
</div>

<!-- HOME VIEW -->
<div id="homeView" style="position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; height:75vh;">

  <!-- REWIND -->
  <button id="prevBtn" style="position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:22px;">
    ⟵
  </button>

  <!-- COVER -->
  <div id="albumCover" style="
    width:75vw;
    max-width:340px;
    height:75vw;
    max-height:340px;
    border-radius:18px;
    background:#222;
    background-size:cover;
    background-position:center;
    transition:all 0.4s ease;
  "></div>

  <h2 id="albumTitle"></h2>
  <p id="albumMeta"></p>

  <button id="playBtn" style="margin-top:10px; padding:14px 20px; background:#1DB954; border:none;">
    ▶ Play
  </button>

  <!-- FORWARD -->
  <button id="nextBtn" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:22px;">
    ⟶
  </button>

</div>

<!-- PROFILE -->
<div id="profileView" style="display:none; position:relative; z-index:2; padding:20px; height:75vh; overflow:auto;">
  <h2>Album Wall</h2>
  <div id="albumWall"></div>
</div>

<!-- FRIENDS -->
<div id="friendsView" style="display:none; position:relative; z-index:2; padding:20px;">
  <h2>Friends</h2>
</div>

<!-- BOTTOM NAV (FIXED) -->
<div style="
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:14px;
  background:#111;
  z-index:10;
">

  <button id="homeBtn">Home</button>
  <button id="profileBtn">Profile</button>
  <button id="friendsBtn">Friends</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
