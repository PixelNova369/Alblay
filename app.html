<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alblay</title>
</head>

<body style="margin:0;background:#000;color:white;font-family:Arial;">

  <div style="padding:20px;text-align:center;">
    <h1>Alblay</h1>

    <div id="albumCover" style="
      width:300px;
      height:300px;
      margin:20px auto;
      background:#222;
      border-radius:16px;
      background-size:cover;
      background-position:center;
    "></div>

    <h2 id="title">No Album Loaded</h2>
    <p id="meta"></p>

    <div>
      <button id="prevBtn">◀</button>
      <button id="playBtn">Play</button>
      <button id="nextBtn">▶</button>
    </div>

    <br>

    <button id="generateBtn">Generate Album</button>
    <button id="saveBtn">Save To Wall</button>
  </div>

  <div style="
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:15px;
  ">
    <button id="homeBtn">Home</button>
    <button id="profileBtn">Profile</button>
    <button id="friendsBtn">Friends</button>
  </div>

  <script type="module" src="./app.js"></script>

</body>
</html>
