<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
}

/* PAGES */
.page{
  display:none;
  padding:16px;
}

.active{
  display:block;
}

/* HOME */
.homeWrap{
  text-align:center;
  padding:20px;
}

#albumCover{
  width:300px;
  height:300px;
  margin:20px auto;
  border-radius:22px;
  background-size:cover;
  background-position:center;
  box-shadow:0 25px 80px rgba(0,255,120,0.15);
  transition:all 0.4s ease;
}

.nowCard{
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:14px;
  margin-top:10px;
  backdrop-filter:blur(10px);
}

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:15px;
}

.controls button{
  width:55px;
  height:55px;
  border-radius:50%;
  border:none;
  background:#1db954;
  color:black;
  font-size:18px;
}

.generateBtn{
  margin-top:15px;
  width:80%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1db954;
  font-weight:bold;
}

/* FRIENDS */
.friendRow{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:8px 0;
  background:#1a1a1a;
  border-radius:10px;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.navBtn{
  flex:1;
  padding:14px;
  background:none;
  border:none;
  color:white;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="homeWrap">

    <h2>Now Playing</h2>

    <div id="albumCover"></div>

    <div class="nowCard">
      <h3 id="title">Loading...</h3>
      <p id="meta"></p>
    </div>

    <div class="controls">
      <button id="prevBtn">⟲</button>
      <button id="playBtn">▶</button>
      <button id="nextBtn">⟳</button>
    </div>

    <button id="generateBtn" class="generateBtn">
      Find Album
    </button>

  </div>
</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h2>Friends</h2>
  <div id="friendsList"></div>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn" class="navBtn">Home</button>
  <button id="friendsBtn" class="navBtn">Friends</button>
</div>

<script src="./app.js"></script>

</body>
</html>
