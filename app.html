<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  overflow:hidden;
}

/* =========================
   BACKGROUND (WRAPPED + IG DEPTH)
========================= */
#bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:#050505;
  overflow:hidden;
}

/* NEON WAVE SYSTEM */
.waveLayer{
  position:absolute;
  inset:-200px;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,120,0.22), transparent 45%),
    radial-gradient(circle at 70% 20%, rgba(0,255,140,0.16), transparent 55%),
    radial-gradient(circle at 50% 80%, rgba(0,255,100,0.12), transparent 60%);
  filter: blur(80px);
  animation: waveMove 14s ease-in-out infinite;
}

.waveLayer::after{
  content:"";
  position:absolute;
  inset:-200px;
  background:
    radial-gradient(circle at 30% 40%, rgba(0,255,120,0.10), transparent 55%),
    radial-gradient(circle at 80% 60%, rgba(0,255,160,0.08), transparent 60%);
  filter: blur(100px);
  animation: waveMove2 20s ease-in-out infinite;
}

/* IG STYLE GRID NOISE */
#bg::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.15;
}

@keyframes waveMove{
  0%{transform:translate(0,0) scale(1);}
  50%{transform:translate(-40px,20px) scale(1.05);}
  100%{transform:translate(0,0) scale(1);}
}

@keyframes waveMove2{
  0%{transform:translate(20px,0) scale(1);}
  50%{transform:translate(-20px,-30px) scale(1.1);}
  100%{transform:translate(20px,0) scale(1);}
}

/* =========================
   PLAYER CARD (WRAPPED STYLE)
========================= */
.nowPlaying{
  width:340px;
  margin:60px auto;
  padding:20px;
  border-radius:28px;

  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,255,120,0.25);

  backdrop-filter: blur(16px);

  box-shadow:
    0 0 30px rgba(0,255,120,0.10),
    0 40px 100px rgba(0,0,0,0.8);

  text-align:center;
}

/* =========================
   ALBUM (STORY MODE)
========================= */
#albumCover{
  width:280px;
  height:280px;
  margin:0 auto 15px;
  border-radius:22px;
  background-size:cover;
  background-position:center;

  transition:0.55s cubic-bezier(.2,.8,.2,1);
  box-shadow:
    0 0 25px rgba(0,255,120,0.12),
    0 40px 100px rgba(0,0,0,0.6);
}

/* TEXT */
h2,p{
  transition:0.3s ease;
}

/* =========================
   BUTTONS (MODERN IG STYLE)
========================= */
button{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  padding:10px 14px;
  border-radius:14px;
  font-size:14px;
  backdrop-filter: blur(8px);
}

/* CONTROL ROW */
.controls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:10px;
}

/* LOWER ACTIONS */
.lowerActions{
  display:flex;
  justify-content:space-between;
  margin-top:18px;
}

/* =========================
   DRAWER (FIXED — NO OVERFLOW)
========================= */
#drawerPanel{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:#0f0f0f;
  padding:20px;

  transform:translateX(100%);
  transition:0.35s cubic-bezier(.2,.8,.2,1);
  z-index:999;

  border-left:1px solid rgba(0,255,120,0.15);
}

#drawerPanel.open{
  transform:translateX(0%);
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg">
  <div class="waveLayer"></div>
</div>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="nowPlaying">

    <div id="albumCover"></div>

    <h2 id="title">Loading...</h2>
    <p id="meta"></p>

    <div class="controls">
      <button id="prevBtn">Prev</button>
      <button id="playBtn">Play</button>
      <button id="nextBtn">Next</button>
    </div>

    <div class="lowerActions">
      <button id="drawerBtn">Filters</button>
      <button id="generateBtn">Generate</button>
    </div>

  </div>

</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">
  <h3>Friends</h3>
</div>

<!-- PROFILE -->
<div id="profilePage" class="page">
  <h3>Profile</h3>
</div>

<!-- DRAWER -->
<div id="drawerPanel">

  <h3>Filters</h3>

  <h4>Genre</h4>
  <select id="genreFilter">
    <option>Any</option>
    <option>rock</option>
    <option>pop</option>
    <option>electronic</option>
  </select>

  <h4>Era</h4>
  <select id="eraFilter">
    <option>Any</option>
    <option>60s</option>
    <option>70s</option>
    <option>80s</option>
    <option>90s</option>
    <option>2000s+</option>
  </select>

  <h4>Length</h4>
  <select id="lengthFilter">
    <option>Any</option>
    <option>Short</option>
    <option>Medium</option>
    <option>Long</option>
  </select>

  <button id="closeDrawerBtn" style="margin-top:20px;width:100%;">
    Back
  </button>

</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
  <button id="profileBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
