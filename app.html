<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alblay</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#050505;
  color:white;
  padding-bottom:80px;
}

/* NAV */
#bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:12px;
}

.page{ display:none; padding:20px; }
.active{ display:block; }

/* NOW PLAYING */
.nowPlaying{
  background:rgba(255,255,255,0.05);
  padding:18px;
  border-radius:18px;
  text-align:center;
  margin-top:20px;
}

#albumCover{
  width:280px;
  height:280px;
  margin:0 auto 15px;
  border-radius:18px;
  background-size:cover;
  background-position:center;
}

/* BUTTONS */
button{
  background:rgba(255,255,255,0.06);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:12px;
}

/* FRIEND UI */
.section{
  margin-top:20px;
  padding:12px;
  background:rgba(255,255,255,0.04);
  border-radius:14px;
}

.friendRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  margin-top:10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">

  <div class="nowPlaying">
    <div id="albumCover"></div>
    <h2 id="title">Loading...</h2>
    <p id="meta"></p>

    <div style="display:flex;gap:10px;justify-content:center;margin-top:10px;">
      <button id="prevBtn">⏮</button>
      <button id="playBtn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>

    <button id="generateBtn" style="margin-top:10px;">Find Album</button>
  </div>

</div>

<!-- FRIENDS -->
<div id="friendsPage" class="page">

  <!-- INBOX -->
  <div class="section">
    <h3>Inbox (Friend Requests)</h3>
    <div id="inboxBox"></div>
  </div>

  <!-- FRIENDS LIST -->
  <div class="section">
    <h3>Friends</h3>
    <div id="friendsList"></div>
  </div>

  <!-- FIND FRIENDS -->
  <div class="section">
    <h3>Find Friends</h3>

    <input id="friendEmail" placeholder="Search by email">
    <button id="sendRequestBtn">Send Request</button>

    <div style="margin-top:10px;">
      <small>Mutuals will appear here</small>
      <div id="mutuals"></div>
    </div>
  </div>

</div>

<!-- PROFILE (unchanged placeholder) -->
<div id="profilePage" class="page">
  <h3>Profile</h3>
</div>

<!-- NAV -->
<div id="bottomNav">
  <button id="homeBtn">Home</button>
  <button id="friendsBtn">Friends</button>
  <button id="profileBtn">Profile</button>
</div>

<script type="module" src="./app.js"></script>

</body>
</html>
