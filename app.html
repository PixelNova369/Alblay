<!DOCTYPE html>
<html>

<head>
  <title>Alblay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:Arial; background:#000; color:white; overflow:hidden;">

<!-- TOP -->
<div style="display:flex; justify-content:space-between; padding:14px; background:#111;">
  <div>Alblay</div>
  <button id="logoutBtn" style="background:#1DB954; border:none; padding:10px;">Logout</button>
</div>

<!-- CENTER PLAYER -->
<div style="
  height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
">

  <!-- rewind -->
  <button id="prevBtn" style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
    ⟵
  </button>

  <!-- cover -->
  <div id="albumCover" style="
    width:75vw;
    max-width:360px;
    height:75vw;
    max-height:360px;
    background:#222;
    border-radius:18px;
  "></div>

  <!-- play -->
  <button id="playBtn" style="margin-top:15px; padding:14px 20px;">
    ▶ Play
  </button>

  <!-- forward -->
  <button id="nextBtn" style="position:absolute; right:10px; top:50%; transform:translateY(-50%);">
    ⟶
  </button>

  <h2 id="albumTitle"></h2>
  <p id="albumMeta"></p>

</div>

<!-- BOTTOM BAR -->
<div style="
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:14px;
  background:#111;
">

  <!-- drawer -->
  <button id="menuBtn">☰ Filters</button>

  <!-- generate -->
  <button id="generateBtn" style="background:#1DB954; border:none; padding:12px;">
    Generate
  </button>

  <!-- save -->
  <button id="saveBtn" style="background:#0A84FF; border:none; padding:12px;">
    Save
  </button>

</div>

<!-- DRAWER -->
<div id="drawer" style="
  display:none;
  position:absolute;
  bottom:60px;
  width:100%;
  background:#151515;
  padding:20px;
">

  <select id="era"><option>Any Era</option><option>80s</option><option>90s</option><option>00s</option></select>
  <select id="genre"><option>Any Genre</option><option>Rock</option><option>Pop</option></select>
  <select id="length"><option>Any Length</option><option>Short</option><option>Medium</option><option>Long</option></select>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
